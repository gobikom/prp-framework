description = "Create comprehensive implementation plan with codebase analysis"
prompt = """# PRP Plan — Create Implementation Plan

Feature: {{args}}

## Mission

Transform the input into a battle-tested implementation plan. PLAN ONLY — no code written. CODEBASE FIRST, RESEARCH SECOND. Read project conventions file.

## Directory Discovery

Run `ls -la` and `ls -la */ 2>/dev/null | head -50`. Do NOT assume `src/` — check: app/, lib/, packages/, cmd/, internal/, pkg/.

## Steps

1. **Detect Input**: PRD file (.prd.md or contains "Implementation Phases") → parse phases, find pending with dependencies complete, note parallelism. Free text → use as feature. Empty → use conversation context.
2. **Detect Toolchain**: Check lock files (bun.lockb/pnpm-lock.yaml/yarn.lock/package-lock.json/pyproject.toml/Cargo.toml/go.mod) → determine runner → read package.json for exact script names → store as plan metadata (Runner, Type Check, Lint, Test, Build commands).
3. **Parse Feature**: Extract problem, user value, type (NEW_CAPABILITY/ENHANCEMENT/REFACTOR/BUG_FIX), complexity, affected systems. Write user story. **GATE**: If ambiguous → STOP and ask. **Testing Decision Gates**: Set flags: NEEDS_INTEGRATION_TESTS, NEEDS_PERF_BENCH, SECURITY_SENSITIVE.
4. **Explore Codebase**: Find similar implementations, naming conventions, error/logging/test patterns, integration points, integration wiring, insertion positions (for UPDATE files), dependencies with versions. Use ACTUAL code snippets with file:line references. Document in table format. **If <3 patterns found**: fallback to adapter patterns → official library docs → framework conventions. Tag sources. Budget: 20K tokens.
5. **Research**: ONLY AFTER exploration. Official docs (match versions), gotchas, security. Format: URL + KEY_INSIGHT + APPLIES_TO + GOTCHA.
6. **Architect**: Analyze architecture fit, execution order, failure modes, performance, security, maintainability. Document approach, rationale, alternatives rejected, scope limits. **Design Doc Integration**: Check `.prp-output/designs/` — incorporate if found. **Technical Design (conditional)**: If complexity=HIGH or API/DB changes → include API Contracts, Database Schema (with migration + rollback), Sequence Diagrams (Mermaid), NFRs, Migration & Rollback plan.
7. **Design UX**: Before/After ASCII diagrams with data flows. Interaction changes table. Architecture constraints from step 6 inform UX.
8. **Generate Plan**: Generate timestamp: `TIMESTAMP=$(date +%Y%m%d-%H%M)`. **Complexity Validation**: LOW ≤3 tasks, MEDIUM 4-10, HIGH >10 — WARN if mismatch. Save to `.prp-output/plans/{feature}-{TIMESTAMP}.plan.md` with plan lifecycle frontmatter (status: pending, runner, mode) and ALL sections: Summary, User Story, Problem/Solution Statements, Metadata (including Runner/commands), UX Design (before/after + interaction table), Mandatory Reading (P0/P1/P2 files), Patterns to Mirror (ACTUAL snippets), Files to Change (CREATE/UPDATE with **Insert At** hints), Integration Points (new code → existing code hook locations), NOT Building (scope limits), Step-by-Step Tasks (ACTION/IMPLEMENT/MIRROR/IMPORTS/GOTCHA/VALIDATE), Testing Strategy (unit tests + integration tests (conditional) + test data + performance benchmarks (conditional) + edge cases), Technical Design (conditional), Validation Commands (6 levels — pre-filled, no {runner} placeholders), Confidence Score (5×2=10: Patterns + Gotchas + Integration + Validation + Testing), Acceptance Criteria, Completion Checklist, Risks and Mitigations.

## Output

If from PRD: update status to `in-progress`, link plan file.
Report: file path, summary, complexity, scope, key patterns, research, UX transformation, risks, confidence score {X}/10 (P:{p} G:{g} I:{i} V:{v} T:{t}), next step.

**Gate**: If ambiguous → STOP and ask for clarification.
- **If `--no-interact` flag is set**: Do NOT ask. Use best judgment, state assumptions in an "## Assumptions" section, and proceed.
- **If `--fast` flag is set**: Skip Research, Technical Design, and Design UX. Compact plan: Summary, Metadata, Files to Change, Integration Points, Tasks (max 5), Validation Commands, Confidence Score. WARN if complexity > LOW.

**Test**: Could an unfamiliar agent implement using ONLY this plan?

Project conventions:
@{CLAUDE.md}
"""
