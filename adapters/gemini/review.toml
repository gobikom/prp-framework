## Update Implementation Report

After posting to GitHub, find implementation report (`ls -t .prp-output/reports/*-report*.md | head -1`). If exists, append Review Outcome section:

```
## Review Outcome
Reviewed: {ISO_TIMESTAMP}
PR: #{NUMBER}
Verdict: {VERDICT}
Review File: .prp-output/reviews/pr-{NUMBER}-review-gemini.md

| Category | Count |
|----------|-------|
| Critical | {N} |
| Important | {N} |
| Suggestions | {N} |

{If NEEDS FIXES or CRITICAL ISSUES: list top issues}
```

If no report found, skip silently.

---

## Update PRD (if applicable)

If implementation report references a Source PRD:

| Verdict | PRD Update |
|---------|------------|
| READY TO MERGE | Change phase status from complete to reviewed |
| NEEDS FIXES | Add note: "Review: {N} issues to address" |
| CRITICAL ISSUES | Add note: "Blocked: {brief reason}" |

---

## Workflow Integration

Before creating PR:
1. Run review on current branch
2. Fix critical and important issues
3. Re-run to verify, then create PR

During PR review:
1. Run review with PR number
2. Review posts summary to GitHub with formal approve/request-changes
3. Address feedback, re-run targeted aspects

After making changes:
1. Run specific aspects (e.g., tests code)
2. Verify issues resolved, push updates

---

## Usage Examples

```
/review 163                        # Full review
/review 163 tests errors           # Specific aspects
/review 163 security deps          # Security + dependency only
/review                            # Current branch's PR
/review 42 code docs              # Only code and docs
/review 42 simplify               # Just simplify
/review 42 perf a11y              # Performance + accessibility focus
/review 163 --since-last-review   # Incremental re-review
/review --metrics                  # View review metrics
```

---

## Critical Reminders

1. Understand before judging — read full context, not just the diff.
2. Be specific — include file:line references and concrete fix suggestions.
3. Prioritize — use severity levels honestly, not everything is critical.
4. Be constructive — offer solutions, not just problems.
5. Acknowledge good work — if something is done well, say so.
6. Run validation — don't skip automated checks.
7. Check patterns — read existing similar code to understand expectations.
8. Think about edge cases — null, empty, very large, concurrent.
9. Check implementation report — documented deviations are intentional.

---

## Success Criteria

- CONTEXT_GATHERED: PR metadata, diff, artifacts reviewed
- CODE_REVIEWED: All changed files analyzed with per-file checklist
- SECURITY_REVIEWED: OWASP Top 10 checked
- DEPS_ANALYZED: CVEs, outdated packages, licenses checked
- VALIDATION_RUN: Type check, lint, tests, build executed
- ISSUES_DEDUPLICATED: Duplicate findings merged across passes
- CONDITIONAL_DISPATCHED: Specialist passes triggered by file types (accessibility, performance)
- ISSUES_CATEGORIZED: Findings organized by severity
- PR_UPDATED: Formal review posted to GitHub (approve/request-changes)
- METRICS_COLLECTED: Review metrics appended to JSONL
- RECOMMENDATION_CLEAR: Verdict with rationale
- CHECKLIST_APPLIED: Per-file review checklist used for every changed file
- PRD_UPDATED: If PRD exists, phase status updated based on verdict
"""
