description = "Comprehensive multi-pass PR code review with aspect selection"
prompt = """# PRP Review — PR Code Review

Target: {{args}}

Format: <pr-number> [aspects: comments|tests|errors|types|code|security|deps|docs|simplify|all] [--since-last-review] [--metrics]

## Phase 0: Context Detection (Token Optimization)

Check for pre-generated pr-context: `.prp-output/reviews/pr-context-{BRANCH}.md`. If found, skip context extraction. Accepts `--context <path>` flag.

## Phase 1: Context Extraction

Skip if Phase 0 found existing context.

1. Get PR: `gh pr view` (with PR number if provided)
2. Check state: merged (stop), closed (warn), draft (note), open (proceed)
3. Gather in ONE pass: PR diff, metadata, changed files, project conventions
4. Save to `.prp-output/reviews/pr-context-{BRANCH}.md`
5. Classify: production, test, config, types, docs

All review passes read from this shared context file.

## Per-File Review Checklist

For EVERY changed file, check: Correctness (logic, edge cases, errors), Type Safety (no implicit any, return types), Pattern Compliance (codebase patterns, naming, imports), Security (input validation, secrets, injection), Performance (N+1, async, memory leaks), Completeness (tests, docs, TODOs), Maintainability (readability, complexity).

## Issue Severity

Critical (RED) = blocking: security, data loss, crashes. High (ORANGE) = should fix: type safety, logic errors. Medium (YELLOW) = consider: pattern inconsistencies. Low (BLUE) = suggestions: style, optimizations.

Implementation report check: documented deviations are intentional — only flag undocumented ones.

## Aspect Selection

| Aspect | When |
|--------|------|
| code | ALWAYS — guidelines, bugs, naming, dead code (80%+ confidence) |
| security | ALWAYS — OWASP Top 10, injection, broken auth, data exposure, SSRF. Only clear attack vectors. |
| deps | ALWAYS — CVEs, outdated packages, abandoned deps, license issues. Include remediation commands. |
| docs | ALMOST ALWAYS — skip for typo/test/config-only. Auto-commit updates to PR branch. |
| tests | When test files or tested code changed — behavioral coverage, gaps, criticality 1-10 |
| comments | When comments/docstrings added — accuracy, completeness, rot risk |
| errors | When error handling changed — silent failures (zero tolerance), logging, specific catches |
| types | When types changed — encapsulation, invariants, usefulness, enforcement (each 1-10) |
| simplify | LAST — nested ternaries to if/else, clever to explicit. Auto-commit to PR branch. |
| all | Default if no aspects specified |

Conditional passes (auto-detected from file types):
- Frontend files (.tsx/.jsx/.vue/.svelte/.css/.html) → include accessibility checks (WCAG 2.1, keyboard nav, contrast)
- Performance-sensitive patterns (DB queries, API endpoints, async loops) → include performance checks (N+1, memory leaks)

## Incremental Review (--since-last-review)

When flag provided: find previous review artifact → extract timestamp → git log --since for changed files → review only those files → merge findings (resolved/remaining/new). Display delta summary.

## Large PR Strategy

When additions + deletions > 500 lines:
- Tier 1 (Critical: security, auth) + Tier 2 (Business: API, services) → full depth
- Tier 3 (Support: utils, config) + Tier 4 (Low: tests, docs) → core passes only
- Include coverage map. If >1000 lines: suggest splitting.

## Validation Phase (Run After Review Passes)

Run automated checks to catch issues that code review alone may miss.

Skip if context file already contains validation results.

### Run Validation Suite

```bash
# Type checking (adapt to project)
npm run type-check || bun run type-check || npx tsc --noEmit

# Linting
npm run lint || bun run lint

# Tests
npm test || bun test

# Build
npm run build || bun run build
```

Capture for each: pass/fail status, error count, warning count, specific failures.

### Specific Validation

| Change Type | Additional Validation |
|-------------|----------------------|
| New API endpoint | Test with curl/httpie |
| Database changes | Check migration exists |
| Config changes | Verify .env.example updated |
| New dependencies | Check package.json/lock file |

### Regression Check

```bash
# Full test suite
npm test || bun test

# Specific tests for changed functionality
npm test -- {relevant-test-pattern}
```

Include validation results in the output report.

## Result Deduplication

Before categorizing, deduplicate findings across passes:
- Same file region (within 5 lines) AND same category = merge into one finding
- Keep most detailed description, highest severity, list all contributing passes
- Do NOT merge: different files, or same location but different categories

## Output

Categorize: Critical (block merge), Important (address), Suggestions, Strengths.
Include: Validation Results table, Documentation Updates, Verdict (READY TO MERGE / NEEDS FIXES / CRITICAL ISSUES).
If validation fails, verdict is at least NEEDS FIXES.

Save review locally to `.prp-output/reviews/pr-{NUMBER}-review-gemini.md` before posting.

Note: Uses `-gemini` suffix to identify Gemini reviews and prevent overwriting reviews from other tools (each tool uses its own suffix for parallel review capability).

### Post to GitHub

READY TO MERGE: `gh pr review <number> --approve --body-file .prp-output/reviews/pr-{NUMBER}-review-gemini.md`
NEEDS FIXES or CRITICAL ISSUES: `gh pr review <number> --request-changes --body-file .prp-output/reviews/pr-{NUMBER}-review-gemini.md`
Draft PR or permission fallback: `gh pr comment <number> --body-file .prp-output/reviews/pr-{NUMBER}-review-gemini.md`

After posting, find implementation report (`ls -t .prp-output/reports/*-report*.md | head -1`). If exists, append Review Outcome section with: review date, PR number, verdict, link to review file (`.prp-output/reviews/pr-{NUMBER}-review-gemini.md`), issue counts by category. If not found, skip.

Update PRD (if applicable): If implementation report references Source PRD — READY TO MERGE → phase status `reviewed`, NEEDS FIXES → add "Review: {N} issues", CRITICAL ISSUES → add "Blocked: {reason}".

## Review Metrics
After posting, append JSONL to `.prp-output/reviews/review-metrics.jsonl` (timestamp, pr_number, verdict, issues by severity, incremental/large_pr flags). `--metrics` flag shows aggregate summary.

## Critical Reminders

1. Understand before judging — read full context. 2. Be specific with file:line. 3. Prioritize honestly. 4. Offer solutions. 5. Acknowledge good work. 6. Run validation. 7. Check patterns. 8. Think about edge cases. 9. Check implementation report — documented deviations are intentional.

## Usage

/prp:review 163              # Full review
/prp:review 163 tests errors # Specific aspects
/prp:review 163 security deps # Security + dependency only
/prp:review                   # Current branch's PR
/prp:review 42 simplify      # Just simplify
/prp:review 163 --since-last-review  # Incremental re-review
/prp:review --metrics                # View review metrics
"""
