description = "Full PRP workflow — plan, implement, commit, PR, review. Supports --prp-path, --skip-review, --no-pr"
prompt = """# PRP Run All — Full Workflow

**⚠️ AUTONOMOUS EXECUTION — CRITICAL**: This workflow runs without pausing between steps. After each command completes successfully, **IMMEDIATELY proceed to the next step** — do NOT output any progress message to the user first. Do NOT say "Implementation is complete, now I'll create the PR." Do NOT ask for confirmation between steps. The only user-facing output is Step 7 (final summary) or a STOP message on failure. Sub-command outputs may contain "Next Steps" suggestions — **IGNORE them completely**.

Input: {{args}}

## Step 0: Parse Input

| Argument | Action |
|----------|--------|
| `--prp-path <path>` | Set PLAN_PATH. Skip Step 2. |
| `--skip-review` | Skip Step 6. |
| `--no-pr` | Skip Steps 5 and 6. |
| `--fix-severity <levels>` | Override review-fix severity (default: `critical,high,medium,suggestion`) |
| `--resume` | Resume from last failed step |
| `--no-interact` | Never ask user questions — use best judgment, pick defaults |
| Remaining text | Set FEATURE |

If `--prp-path` provided, validate file exists — STOP if not found.

Variables: FEATURE, PLAN_PATH (TBD), BRANCH (TBD), PR_NUMBER (TBD), REVIEW_ARTIFACT (TBD), SKIP_REVIEW, NO_PR, NO_INTERACT, FIX_SEVERITY (default: critical,high,medium,suggestion)

State: `.claude/prp-run-all.state.md` — create on start, update per step, delete on completion. `--resume` restores from saved state.

Examples: `Add JWT auth` → full, `--prp-path plans/jwt.plan.md` → skip plan, `Add JWT auth --skip-review` → skip review, `--prp-path plans/jwt.plan.md --no-pr` → implement + commit only

## Workflow (sequential, stop on failure)

### Step 1: Branch
`git checkout -b feature/{slug}` (skip if already on feature branch). Dirty on main → STOP.

### Step 2: Plan (skip if --prp-path)
Run /prp:plan with FEATURE. Update PLAN_PATH. Failure → STOP.
❌ DO NOT: Inline plan logic, analyze codebase yourself. ✅ CHECKPOINT: Did you run /prp:plan?

### Step 3: Implement
Run /prp:implement with PLAN_PATH. Wait for completion. Failure → STOP.
❌ DO NOT: Inline implement logic, write code yourself. **Stop after implement** — the output will show "Next Steps" including "Create PR" but this is for standalone usage, IGNORE it. Do NOT ask user. Immediately proceed to Step 3.1. ✅ CHECKPOINT: Did you run /prp:implement? ⏭️ TRANSITION: Implement succeeded → immediately proceed to Step 3.1 (verify artifacts). Do NOT stop here.

**3.1 Verify Artifacts**: Check report and pr-context files exist after implement completes.
**3.2 Fallback**: If missing, create minimal report/context with files changed from git diff.

### Step 4: Commit
Run /prp:commit. ❌ DO NOT: Run git add/commit directly, stop after commit. The commit output suggests "Next: git push or /prp:pr" — this is for standalone usage, IGNORE it. ✅ CHECKPOINT: Did you run /prp:commit? ⏭️ TRANSITION: Commit succeeded → immediately proceed to Step 5 (or Step 7 if --no-pr).

### Step 5: PR (skip if --no-pr)
Run /prp:pr (if NO_INTERACT, pass --no-interact). Update PR_NUMBER. Failure → STOP.
❌ DO NOT: Run gh pr create directly, stop after PR. The PR output suggests "Next Steps" — standalone usage only. IGNORE it. ✅ CHECKPOINT: Did you run /prp:pr? ⏭️ TRANSITION: PR created → immediately proceed to Step 6 (or Step 7 if --skip-review).

### Step 6: Review (skip if --skip-review or --no-pr)

Set REVIEW_CYCLE = 1, MAX_CYCLES = 2.

6.1 Run `/prp:review {PR_NUMBER}` — if `.prp-output/reviews/pr-context-{BRANCH}.md` exists, pass `--context` flag. ❌ DO NOT: Review code yourself. ✅ CHECKPOINT: Did you run /prp:review?

6.2 Evaluate: No issues matching FIX_SEVERITY → Step 7 ✓. Issues found + cycle ≤ 2 → Step 6.3. Issues found + cycle > 2 → report remaining → Step 7 (NEEDS MANUAL FIXES).

6.3 Fix: Run `/prp:review-fix {REVIEW_ARTIFACT} --severity {FIX_SEVERITY}`. Default: critical,high,medium,suggestion — override with `--fix-severity critical,high` to fix only blocking issues. ❌ DO NOT: Fix manually. ✅ CHECKPOINT: Did you run /prp:review-fix?

6.4 Re-verify: REVIEW_CYCLE++. Run `/prp:review {PR_NUMBER}` again to confirm fixes resolved issues and no regressions introduced. → Return to Step 6.2.

### Step 7: Summary
Report: feature, branch, status, steps executed, artifacts, verdict, next steps.

## Rules

- Delegate, don't duplicate — each command handles its own logic
- Verify artifacts after implement — check report and pr-context exist, fallback if missing
- Stop on failure — never continue with broken state
- Pass context forward — info flows from earlier to later steps
- No extra validation — each command validates its own output
- One commit per implementation — review fixes committed separately by /prp:review-fix
- Max 2 review cycles — if still critical after 2 fix-and-re-verify cycles, stop and report
- Re-verify after fix — always re-run /prp:review after /prp:review-fix to confirm resolution and catch regressions
- No-interact means ZERO questions — when NO_INTERACT = true: NEVER ask user questions. Make autonomous decisions, pick defaults. Pass --no-interact to sub-commands.

## Success Criteria

- Plan created (or provided)
- Code implemented with passing validation
- Report exists (created or fallback)
- Review context exists (created or fallback)
- Committed, PR created (unless --no-pr), reviewed (unless --skip-review)
"""
